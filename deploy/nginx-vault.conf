# Cloud Vault Capture — Nginx reverse proxy config
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    location /vault-api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
    }

    # Optional: serve stored files as static
    location /vault-files/ {
        alias /srv/cloud-vault/inbox/browser-capture/;
        autoindex on;
    }
}
